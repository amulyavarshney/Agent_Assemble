# Render Blueprint — Care Gap Closer
#
# Deploys two services from this monorepo:
#   1. care-gap-mcp     the SHARP-on-MCP server (FastMCP, Python 3.13)
#   2. care-gap-agent   the A2A v1 agent (Google ADK, Python 3.11)
#
# Free tier: both services scale to zero after ~15 min idle. First request
# after idle pays a one-time cold start (~30s). Acceptable for hackathon
# judging; for production set plan: starter.
#
# ── Secrets to set in the Render dashboard before first deploy ───────────
#   On care-gap-mcp:
#     GOOGLE_API_KEY        Google AI Studio key (sync: false)
#
#   On care-gap-agent:
#     GOOGLE_API_KEY        Google AI Studio key (sync: false)
#     API_KEY_PRIMARY       Bearer used by X-API-Key (sync: false)
#     MCP_SERVER_URL        Full https URL of care-gap-mcp + /mcp
#                           e.g. https://care-gap-mcp-abcd.onrender.com/mcp
#                           Set AFTER the MCP service deploys and you see its URL.
#
# Render injects PORT for each service; both apps bind 0.0.0.0:$PORT.

services:

  # ── MCP server ───────────────────────────────────────────────────────────
  - type: web
    name: care-gap-mcp
    runtime: python
    plan: free
    region: oregon
    rootDir: care_gap_mcp
    pythonVersion: "3.13"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    # FastMCP reads MCP_HOST and MCP_PORT (see care_gap_mcp/main.py).
    startCommand: MCP_HOST=0.0.0.0 MCP_PORT=$PORT python main.py
    healthCheckPath: /mcp
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

  # ── A2A agent ────────────────────────────────────────────────────────────
  - type: web
    name: care-gap-agent
    runtime: python
    plan: free
    region: oregon
    rootDir: care_gap_agent
    pythonVersion: "3.11"
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn care_gap_agent.app:a2a_app --host 0.0.0.0 --port $PORT
    healthCheckPath: /.well-known/agent-card.json
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: API_KEY_PRIMARY
        sync: false
      - key: MCP_SERVER_URL
        sync: false               # set to https://<mcp-host>.onrender.com/mcp after MCP deploys
      - key: CARE_GAP_AGENT_MODEL
        value: gemini/gemini-2.5-flash
      - key: PO_PLATFORM_BASE_URL
        value: https://app.promptopinion.ai
